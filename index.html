<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller 2 - Actividades JavaScript</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="bg-shapes" aria-hidden="true">
        <span class="shape shape-a"></span>
        <span class="shape shape-b"></span>
        <span class="shape shape-c"></span>
    </div>

    <main class="window" role="application" aria-label="Panel de actividades">
        <header class="window-header">
            <div class="traffic-lights" aria-hidden="true">
                <span class="light close"></span>
                <span class="light minimize"></span>
                <span class="light maximize"></span>
            </div>
            <div class="window-title-group">
                <h1>Taller 2 - Actividades</h1>
                <p>Interfaz unica para ejecutar cada ejercicio</p>
            </div>
        </header>

        <section class="window-body">
            <aside class="sidebar">
                <h2>Actividades</h2>
                <nav id="activityNav" class="activity-nav" aria-label="Selector de actividades">
                    <button class="mac-button is-active" data-activity="1">Actividad 1</button>
                    <button class="mac-button" data-activity="2">Actividad 2</button>
                    <button class="mac-button" data-activity="3">Actividad 3</button>
                    <button class="mac-button" data-activity="4">Actividad 4</button>
                    <button class="mac-button" data-activity="5">Actividad 5</button>
                    <button class="mac-button" data-activity="6">Actividad 6</button>
                </nav>
            </aside>

            <section class="content">
                <div id="activityContent" class="activity-content" aria-live="polite"></div>
            </section>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
